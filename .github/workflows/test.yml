name: Test Windows Installer

on:
  push:
    branches: [master]
    paths:
      - 'install.ps1'
      - 'gity.sh'
  pull_request:
    branches: [master]
    paths:
      - 'install.ps1'
      - 'gity.sh'
  workflow_dispatch:

jobs:
  test-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run installer
        shell: pwsh
        run: |
          # Run the installer
          ./install.ps1
          
          # Verify gity is in PATH
          Write-Host "Checking gity.cmd exists..."
          $gityCmd = Join-Path $env:LOCALAPPDATA "Programs\Gity\gity.cmd"
          if (Test-Path $gityCmd) {
              Write-Host "OK: gity.cmd exists"
          } else {
              Write-Host "FAIL: gity.cmd not found"
              exit 1
          }
          
          # Verify gity.sh exists
          $gitySh = Join-Path $env:LOCALAPPDATA "Programs\Gity\gity.sh"
          if (Test-Path $gitySh) {
              Write-Host "OK: gity.sh exists"
          } else {
              Write-Host "FAIL: gity.sh not found"
              exit 1
          }
          
          # Verify dependencies
          Write-Host "Checking dependencies..."
          $deps = @("git", "fzf", "lazygit", "gh")
          foreach ($dep in $deps) {
              if (Get-Command $dep -ErrorAction SilentlyContinue) {
                  Write-Host "OK: $dep installed"
              } else {
                  Write-Host "WARN: $dep not found (may need manual install)"
              }
          }
          
          Write-Host "Windows installer test complete!"
      
      - name: Test running gity
        shell: pwsh
        run: |
          # Refresh PATH
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH", "User")
          
          # Find Git Bash
          $bashExe = Get-Command bash.exe -ErrorAction SilentlyContinue
          if (!$bashExe) {
              Write-Host "FAIL: bash.exe not found"
              exit 1
          }
          Write-Host "Found bash.exe at: $($bashExe.Source)"
          
          # Run gity.sh with timeout to verify it starts
          $gitySh = Join-Path $env:LOCALAPPDATA "Programs\Gity\gity.sh"
          Write-Host "Testing gity.sh execution..."
          
          # Run in background, capture output, then kill after 10 seconds
          $tempOut = Join-Path $env:TEMP "gity_output.txt"
          $process = Start-Process -FilePath $bashExe.Source -ArgumentList "-c", "timeout 10 bash `"$gitySh`"" -NoNewWindow -PassThru -RedirectStandardOutput $tempOut
          
          # Wait for process to finish (timeout will kill it after 10s)
          $process.WaitForExit(30000) | Out-Null
          Write-Host "gity.sh exited with code: $($process.ExitCode)"
          
          # Check output for expected content
          if (Test-Path $tempOut) {
              $output = Get-Content $tempOut -Raw
              Write-Host "gity output preview:"
              Write-Host $output
              
              if ($output -match "GITY") {
                  Write-Host "OK: gity.sh started and rendered UI"
              } else {
                  Write-Host "WARN: gity.sh ran but output may be incomplete"
              }
          }
          
          # Test gity.cmd wrapper syntax
          Write-Host "Testing gity.cmd wrapper..."
          $gityCmd = Join-Path $env:LOCALAPPDATA "Programs\Gity\gity.cmd"
          $cmdContent = Get-Content $gityCmd -Raw
          if ($cmdContent -match "bash.exe" -and $cmdContent -match "gity.sh") {
              Write-Host "OK: gity.cmd wrapper is valid"
          } else {
              Write-Host "FAIL: gity.cmd wrapper is malformed"
              exit 1
          }

  test-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git fzf
      
      - name: Run installer
        run: |
          chmod +x install.sh
          ./install.sh
      
      - name: Verify installation
        run: |
          if command -v gity &>/dev/null; then
              echo "OK: gity installed"
          else
              echo "FAIL: gity not in PATH"
              exit 1
          fi

  test-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run installer
        run: |
          chmod +x install.sh
          ./install.sh
      
      - name: Verify installation
        run: |
          if command -v gity &>/dev/null; then
              echo "OK: gity installed"
          else
              echo "FAIL: gity not in PATH"
              exit 1
          fi
